<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>System Design Course — Interview Practice Platform</title>
    <meta name="description" content="Learn system design through a 30-step course with progress tracking and chapter notes." />
    <link rel="icon" type="image/svg+xml" href="assets/logo-mark.svg" />
    <link rel="stylesheet" href="css/global.css" />
    <link rel="stylesheet" href="css/components.css" />
  </head>
  <body data-theme="dark" class="app-v2-theme system-design-page">
    <div class="bg-shape bg-shape-a"></div>
    <div class="bg-shape bg-shape-b"></div>

    <button id="sidebarToggle" class="sidebar-toggle" type="button" aria-label="Toggle menu">☰</button>
    <div id="sidebarOverlay" class="sidebar-overlay"></div>

    <div class="app-layout">
      <aside id="sidebar" class="sidebar">
        <div class="sidebar-brand">
          <h2><img class="brand-logo" src="assets/logo-mark.svg" alt="Interview Assistant logo" /> Interview Assistant</h2>
        </div>
        <nav class="sidebar-nav"></nav>
        <div class="sidebar-footer">
          <div class="sidebar-user">
            <img class="sidebar-avatar" src="" alt="Avatar" />
            <div class="sidebar-user-info">
              <p class="sidebar-user-name">Guest</p>
              <p class="sidebar-user-email">Not signed in</p>
            </div>
          </div>
          <div class="button-row">
            <button id="themeToggleBtn" class="btn btn-sm btn-icon" type="button" aria-label="Toggle theme">🌙</button>
            <button id="loginBtn" class="btn btn-sm btn-primary" type="button">Sign In</button>
            <button id="signOutBtn" class="btn btn-sm hidden" type="button">Sign Out</button>
          </div>
        </div>
      </aside>

      <main class="main-content system-design-main">
        <div class="page-header">
          <h1>🧠 System Design Course</h1>
          <div class="page-header-actions">
            <span id="sdCompletionBadge" class="counter-badge">0 / 30</span>
          </div>
        </div>

        <section class="card-flat section">
          <p class="card-subtitle">All chapter HTML pages are listed below. Open any chapter directly, and tick Done to update your progress.</p>
          <div class="progress-wrap system-design-progress-wrap">
            <div id="sdProgressFill" class="progress-fill"></div>
          </div>
          <p id="sdProgressText" class="text-sm text-muted" style="margin-top:0.55rem;">0% complete</p>
        </section>

        <section class="card-flat section system-design-list-panel">
          <div class="system-design-steps-head">
            <h3>📚 Chapters</h3>
            <span id="sdCompletedPill" class="pill">0 completed</span>
          </div>
          <div id="systemDesignSteps" class="system-design-steps-list">
            <p class="loading"><span class="loading-dot">⏳</span> Loading chapters...</p>
          </div>
        </section>
      </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/api.js"></script>
    <script src="js/sidebar.js"></script>
    <script src="js/system-design.js"></script>
  </body>
</html>
