<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profile - Interview Practice Platform</title>
    <meta name="description" content="Manage your profile details including name, phone number, and avatar." />
    <link rel="icon" type="image/svg+xml" href="assets/logo-mark.svg" />
    <link rel="stylesheet" href="css/global.css" />
    <link rel="stylesheet" href="css/components.css" />
  </head>
  <body data-theme="dark" class="app-v2-theme">
    <div class="bg-shape bg-shape-a"></div>
    <div class="bg-shape bg-shape-b"></div>

    <button id="sidebarToggle" class="sidebar-toggle" type="button" aria-label="Toggle menu">☰</button>
    <div id="sidebarOverlay" class="sidebar-overlay"></div>

    <div class="app-layout">
      <aside id="sidebar" class="sidebar">
        <div class="sidebar-brand">
          <h2><img class="brand-logo" src="assets/logo-mark.svg" alt="Interview Assistant logo" /> Interview Assistant</h2>
        </div>
        <nav class="sidebar-nav"></nav>
        <div class="sidebar-footer">
          <div class="sidebar-user">
            <img class="sidebar-avatar" src="" alt="Avatar" />
            <div class="sidebar-user-info">
              <p class="sidebar-user-name">Guest</p>
              <p class="sidebar-user-email">Not signed in</p>
            </div>
          </div>
          <div class="button-row">
            <button id="themeToggleBtn" class="btn btn-sm btn-icon" type="button" aria-label="Toggle theme">🌙</button>
            <button id="loginBtn" class="btn btn-sm btn-primary" type="button">Sign In</button>
            <button id="signOutBtn" class="btn btn-sm hidden" type="button">Sign Out</button>
          </div>
        </div>
      </aside>

      <main class="main-content">
        <div class="page-header">
          <h1>👤 Profile</h1>
        </div>

        <section class="card-flat section">
          <div class="card-header">
            <h3>Account Details</h3>
          </div>
          <div class="form-row section">
            <div class="control-group">
              <label for="profileName">Full Name</label>
              <input id="profileName" type="text" placeholder="Enter full name" />
            </div>
            <div class="control-group">
              <label for="profilePhone">Phone Number</label>
              <input id="profilePhone" type="text" inputmode="numeric" autocomplete="tel-national" pattern="[0-9]{10}" maxlength="10" placeholder="Enter 10-digit phone number" />
            </div>
          </div>

          <div class="control-group section">
            <label for="profileEmail">Email</label>
            <input id="profileEmail" type="email" disabled />
          </div>

          <div class="control-group section">
            <label>Profile Picture</label>
            <div class="profile-avatar-editor">
              <img id="profileAvatarPreview" class="profile-avatar-preview" src="" alt="Profile picture" />
              <button id="profileAvatarEditBtn" class="profile-avatar-edit-btn" type="button" aria-label="Upload profile picture">
                ✎
              </button>
              <input id="profileAvatarFile" class="profile-avatar-file-input" type="file" accept="image/*" aria-label="Choose profile picture" />
            </div>
            <p class="text-sm text-muted">Click the pencil icon to upload a profile image. It is automatically compressed to 512KB max.</p>
          </div>

          <div class="status-bar section" style="margin-bottom:0;">
            <span id="profileStatus" class="status-text">Loading profile...</span>
            <div class="status-right">
              <button id="saveProfileBtn" class="btn btn-primary" type="button">Save Profile</button>
            </div>
          </div>
        </section>
      </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/api.js"></script>
    <script src="js/sidebar.js"></script>
    <script src="js/profile.js"></script>
  </body>
</html>
