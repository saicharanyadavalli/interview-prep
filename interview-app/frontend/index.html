<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign In — Interview Practice Platform</title>
    <meta name="description" content="Sign in with Google to access the Interview Practice Platform. Practice coding interview questions with AI-powered assistance." />
    <link rel="icon" type="image/svg+xml" href="assets/logo-mark.svg" />
    <link rel="stylesheet" href="css/global.css" />
    <link rel="stylesheet" href="css/components.css" />
  </head>
  <body data-theme="dark" class="app-v2-theme">
    <div class="bg-shape bg-shape-a"></div>
    <div class="bg-shape bg-shape-b"></div>

    <div class="login-page">
      <div class="login-card">
        <img class="brand-logo" src="assets/logo-mark.svg" alt="Interview Assistant logo" />
        <h1>Interview Assistant</h1>
        <p class="subtitle">Sharpen your coding interview skills with AI-powered guidance</p>

        <div class="login-divider">continue with</div>

        <button id="googleSignInBtn" class="btn btn-google" type="button">
          <svg width="20" height="20" viewBox="0 0 48 48"><path fill="#4285F4" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#34A853" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59A14.5 14.5 0 0 1 9.5 24c0-1.59.28-3.14.76-4.59l-7.98-6.19A23.99 23.99 0 0 0 0 24c0 3.77.9 7.35 2.56 10.53l7.97-5.94z"/><path fill="#EA4335" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 5.94C6.51 42.62 14.62 48 24 48z"/></svg>
          Sign in with Google
        </button>

        <p class="text-muted text-sm" style="margin-top: 1.5rem;">
          By signing in, you agree to practice responsibly 🚀
        </p>
      </div>
    </div>

    <!-- Supabase JS client from CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", async () => {
        // Load saved theme
        const theme = localStorage.getItem("theme") || "dark";
        document.body.setAttribute("data-theme", theme);

        // If already logged in, redirect to dashboard
        const { session } = await getSession();
        if (session) {
          window.location.href = "dashboard.html";
          return;
        }

        // Google sign in button
        document.getElementById("googleSignInBtn").addEventListener("click", () => {
          signInWithGoogle();
        });
      });
    </script>
  </body>
</html>
