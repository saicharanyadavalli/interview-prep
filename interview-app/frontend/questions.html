<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>All Questions — Interview Practice Platform</title>
    <meta name="description" content="Browse all interview questions by company and difficulty. Mark progress, add notes, and track your practice." />
    <link rel="icon" type="image/svg+xml" href="assets/logo-mark.svg" />
    <link rel="stylesheet" href="css/global.css" />
    <link rel="stylesheet" href="css/components.css" />
  </head>
  <body data-theme="dark" class="app-v2-theme questions-v2-page">
    <div class="bg-shape bg-shape-a"></div>
    <div class="bg-shape bg-shape-b"></div>

    <button id="sidebarToggle" class="sidebar-toggle" type="button" aria-label="Toggle menu">☰</button>
    <div id="sidebarOverlay" class="sidebar-overlay"></div>

    <div class="app-layout">
      <aside id="sidebar" class="sidebar">
        <div class="sidebar-brand">
          <h2><img class="brand-logo" src="assets/logo-mark.svg" alt="Interview Assistant logo" /> Interview Assistant</h2>
        </div>
        <nav class="sidebar-nav"></nav>
        <div class="sidebar-footer">
          <div class="sidebar-user">
            <img class="sidebar-avatar" src="" alt="Avatar" />
            <div class="sidebar-user-info">
              <p class="sidebar-user-name">Guest</p>
              <p class="sidebar-user-email">Not signed in</p>
            </div>
          </div>
          <div class="button-row">
            <button id="themeToggleBtn" class="btn btn-sm btn-icon" type="button" aria-label="Toggle theme">🌙</button>
            <button id="loginBtn" class="btn btn-sm btn-primary" type="button">Sign In</button>
            <button id="signOutBtn" class="btn btn-sm hidden" type="button">Sign Out</button>
          </div>
        </div>
      </aside>

      <main class="main-content questions-main-content">
        <header class="questions-v2-topbar section">
          <h1>
            <img class="brand-logo" src="assets/logo-mark.svg" alt="Interview Assistant logo" />
            <span>Interview Assistant</span>
          </h1>
          <div class="page-header-actions">
            <span id="totalCount" class="counter-badge">0</span>
          </div>
        </header>

        <section class="questions-v2-shell">
          <div class="questions-v2-left">
            <div class="questions-search-wrap section">
              <span class="questions-search-icon" aria-hidden="true">⌕</span>
              <input
                id="searchInput"
                type="text"
                autocomplete="off"
                placeholder="Search questions, companies, difficulty..."
              />
              <div id="searchSuggestions" class="questions-search-suggestions hidden" aria-live="polite"></div>
            </div>

            <section class="section" aria-label="Question filters">
              <div id="filterBuilder"></div>
            </section>

            <section id="questionsScroller" class="questions-v2-list-scroller section" aria-label="Questions list">
              <div id="questionsList" class="q-browse-list">
                <div class="empty-state">
                  <p class="empty-icon">📋</p>
                  <p>Questions will load automatically.</p>
                </div>
              </div>
            </section>
          </div>

          <aside class="questions-v2-right" aria-label="Selected question details">
            <article class="questions-v2-preview-card section">
              <h2 id="selectedTitle">Select a question</h2>
              <p id="selectedSummary" class="text-muted">Choose a question from the list to see details.</p>
            </article>

            <article class="questions-v2-meta-card section">
              <p><strong>Success Rate:</strong> <span id="selectedSuccessRate">--</span></p>
              <p><strong>Companies:</strong> <span id="selectedCompanies">--</span></p>

              <div class="questions-v2-actions">
                <button id="addToCustomBtn" class="btn btn-outline-neon" type="button">Add to Custom Folder</button>
                <button id="addToRevisitBtn" class="btn btn-outline-neon" type="button">Add to Revisit Queue</button>
                <a id="openSolveBtn" class="btn btn-primary" href="solve.html">Open Question</a>
              </div>
            </article>
          </aside>
        </section>
      </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/api.js"></script>
    <script src="js/sidebar.js"></script>
    <script src="js/filterBuilder.js"></script>
    <script src="js/questions.js"></script>
  </body>
</html>
