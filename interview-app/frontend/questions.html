<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>All Questions — Interview Practice Platform</title>
    <meta name="description" content="Browse all interview questions by company and difficulty. Mark progress, add notes, and track your practice." />
    <link rel="stylesheet" href="css/global.css" />
    <link rel="stylesheet" href="css/components.css" />
  </head>
  <body data-theme="dark">
    <div class="bg-shape bg-shape-a"></div>
    <div class="bg-shape bg-shape-b"></div>

    <button id="sidebarToggle" class="sidebar-toggle" type="button" aria-label="Toggle menu">☰</button>
    <div id="sidebarOverlay" class="sidebar-overlay"></div>

    <div class="app-layout">
      <aside id="sidebar" class="sidebar">
        <div class="sidebar-brand">
          <h2><span class="brand-icon">🎯</span> InterviewPrep</h2>
        </div>
        <nav class="sidebar-nav"></nav>
        <div class="sidebar-footer">
          <div class="sidebar-user">
            <img class="sidebar-avatar" src="" alt="Avatar" />
            <div class="sidebar-user-info">
              <p class="sidebar-user-name">Guest</p>
              <p class="sidebar-user-email">Not signed in</p>
            </div>
          </div>
          <div class="button-row">
            <button id="themeToggleBtn" class="btn btn-sm btn-icon" type="button" aria-label="Toggle theme">🌙</button>
            <button id="loginBtn" class="btn btn-sm btn-primary" type="button">Sign In</button>
            <button id="signOutBtn" class="btn btn-sm hidden" type="button">Sign Out</button>
          </div>
        </div>
      </aside>

      <main class="main-content">
        <div class="page-header">
          <h1>📋 All Questions</h1>
          <div class="page-header-actions">
            <span id="totalCount" class="counter-badge">0</span>
          </div>
        </div>

        <!-- Search -->
        <div class="form-row section questions-filters-row">
          <div class="control-group">
            <input id="searchInput" type="text" placeholder="🔍 Search by name, company, difficulty, or tag..." />
          </div>
        </div>

        <section class="section" aria-label="Question filters">
          <div id="filterBuilder"></div>
        </section>

        <!-- Questions List -->
        <div id="questionsList" class="q-browse-list">
          <div class="empty-state">
            <p class="empty-icon">📋</p>
            <p>Questions will load automatically.</p>
          </div>
        </div>
      </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/api.js"></script>
    <script src="js/sidebar.js"></script>
    <script src="js/filterBuilder.js"></script>
    <script src="js/questions.js"></script>
  </body>
</html>
