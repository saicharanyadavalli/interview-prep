<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard — Interview Practice Platform</title>
    <meta name="description" content="Your interview practice dashboard. View progress, recent questions, and revisit queue." />
    <link rel="icon" type="image/svg+xml" href="assets/logo-mark.svg" />
    <link rel="stylesheet" href="css/global.css" />
    <link rel="stylesheet" href="css/components.css" />
  </head>
  <body data-theme="dark" class="app-v2-theme">
    <div class="bg-shape bg-shape-a"></div>
    <div class="bg-shape bg-shape-b"></div>

    <!-- Mobile sidebar toggle -->
    <button id="sidebarToggle" class="sidebar-toggle" type="button" aria-label="Toggle menu">☰</button>
    <div id="sidebarOverlay" class="sidebar-overlay"></div>

    <div class="app-layout">
      <!-- Sidebar -->
      <aside id="sidebar" class="sidebar">
        <div class="sidebar-brand">
          <h2><img class="brand-logo" src="assets/logo-mark.svg" alt="Interview Assistant logo" /> Interview Assistant</h2>
        </div>
        <nav class="sidebar-nav">
          <!-- Populated by sidebar.js -->
        </nav>
        <div class="sidebar-footer">
          <div class="sidebar-user">
            <img class="sidebar-avatar" src="" alt="Avatar" />
            <div class="sidebar-user-info">
              <p class="sidebar-user-name">Guest</p>
              <p class="sidebar-user-email">Not signed in</p>
            </div>
          </div>
          <div class="button-row">
            <button id="themeToggleBtn" class="btn btn-sm btn-icon" type="button" aria-label="Toggle theme">🌙</button>
            <button id="loginBtn" class="btn btn-sm btn-primary" type="button">Sign In</button>
            <button id="signOutBtn" class="btn btn-sm hidden" type="button">Sign Out</button>
          </div>
        </div>
      </aside>

      <!-- Main Content -->
      <main class="main-content">
        <div class="page-header">
          <h1>📊 Dashboard</h1>
        </div>

        <!-- Stats -->
        <section class="section">
          <h3 class="section-title">📈 Your Progress</h3>
          <div id="statsGrid" class="stats-grid">
            <div class="stat-card attempted">
              <p class="stat-label">Total Attempted</p>
              <p class="stat-value">0</p>
            </div>
            <div class="stat-card revisit">
              <p class="stat-label">Revisit</p>
              <p class="stat-value">0</p>
            </div>
          </div>
        </section>

        <section class="section dashboard-track-card">
          <h3 class="section-title">🧠 Learning Tracks</h3>
          <div id="dashboardLearningTracksList" class="card-flat dashboard-track-list">
            <p class="track-empty">Loading learning tracks...</p>
          </div>
        </section>

        <!-- Two Column: Recent + Revisit -->
        <div class="two-col">
          <section class="section">
            <h3 class="section-title">🕐 Recently Attempted</h3>
            <div class="card-flat">
              <div id="recentList" class="track-list">
                <p class="track-empty">Loading...</p>
              </div>
            </div>
          </section>

          <section class="section">
            <h3 class="section-title">🔄 Revisit Queue</h3>
            <div class="card-flat">
              <div id="revisitPreview" class="track-list">
                <p class="track-empty">Loading...</p>
              </div>
            </div>
          </section>
        </div>
      </main>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/learning-tracks.js"></script>
    <script src="js/api.js"></script>
    <script src="js/sidebar.js"></script>
    <script src="js/dashboard.js"></script>
  </body>
</html>
