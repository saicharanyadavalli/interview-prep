<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Revisit Queue — Interview Practice Platform</title>
    <meta name="description" content="Review and practice questions you've marked for revisit." />
    <link rel="icon" type="image/svg+xml" href="assets/logo-mark.svg" />
    <link rel="stylesheet" href="css/global.css" />
    <link rel="stylesheet" href="css/components.css" />
  </head>
  <body data-theme="dark" class="app-v2-theme revisit-v3-page">
    <div class="bg-shape bg-shape-a"></div>
    <div class="bg-shape bg-shape-b"></div>

    <button id="sidebarToggle" class="sidebar-toggle" type="button" aria-label="Toggle menu">☰</button>
    <div id="sidebarOverlay" class="sidebar-overlay"></div>

    <div class="app-layout">
      <aside id="sidebar" class="sidebar">
        <div class="sidebar-brand">
          <h2><img class="brand-logo" src="assets/logo-mark.svg" alt="Interview Assistant logo" /> Interview Assistant</h2>
        </div>
        <nav class="sidebar-nav"></nav>
        <div class="sidebar-footer">
          <div class="sidebar-user">
            <img class="sidebar-avatar" src="" alt="Avatar" />
            <div class="sidebar-user-info">
              <p class="sidebar-user-name">Guest</p>
              <p class="sidebar-user-email">Not signed in</p>
            </div>
          </div>
          <div class="button-row">
            <button id="themeToggleBtn" class="btn btn-sm btn-icon" type="button" aria-label="Toggle theme">🌙</button>
            <button id="loginBtn" class="btn btn-sm btn-primary" type="button">Sign In</button>
            <button id="signOutBtn" class="btn btn-sm hidden" type="button">Sign Out</button>
          </div>
        </div>
      </aside>

      <main class="main-content revisit-v3-main">
        <div class="page-header revisit-v3-header">
          <div>
            <h1>🔄 Revisit Queue</h1>
            <p class="card-subtitle">Questions you flagged for another attempt. Keep this queue lean and focused.</p>
          </div>
          <div class="page-header-actions">
            <span id="revisitCount" class="counter-badge">0</span>
          </div>
        </div>

        <section class="revisit-v3-stats section">
          <article class="stat-card attempted">
            <p class="stat-label">Queue Size</p>
            <p id="revisitTotalStat" class="stat-value">0</p>
          </article>
          <article class="stat-card">
            <p class="stat-label">Easy</p>
            <p id="revisitEasyStat" class="stat-value">0</p>
          </article>
          <article class="stat-card">
            <p class="stat-label">Medium</p>
            <p id="revisitMediumStat" class="stat-value">0</p>
          </article>
          <article class="stat-card revisit">
            <p class="stat-label">Hard</p>
            <p id="revisitHardStat" class="stat-value">0</p>
          </article>
        </section>

        <section class="card-flat revisit-v3-list-card">
          <div id="revisitList" class="revisit-v3-list">
            <p class="loading"><span class="loading-dot">⏳</span> Loading...</p>
          </div>
        </section>
      </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/api.js"></script>
    <script src="js/sidebar.js"></script>
    <script src="js/revisit.js"></script>
  </body>
</html>
